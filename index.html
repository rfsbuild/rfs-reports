<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RFS Builders · Weekly Reports</title>
<style>
  :root{--blue:#3b6ea5;--blue-deep:#2c5683;--blue-soft:#e8eef6;--paper:#f0f4f8;--card:#fff;--ink:#1e293b;--ink-soft:#475569;--ink-muted:#94a3b8;--rule:#e2e8f0;}
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--paper);color:var(--ink);margin:0;padding:40px 16px;line-height:1.5;font-size:15px}
  .wrap{max-width:680px;margin:0 auto}
  .brand{font-size:11px;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.18em;font-weight:700}
  h1{font-size:30px;font-weight:700;margin:6px 0 4px;color:var(--blue-deep);letter-spacing:-0.02em}
  .sub{font-size:14px;color:var(--ink-soft);margin-bottom:30px}
  .reports{background:var(--card);border-radius:12px;padding:6px 0;box-shadow:0 1px 3px rgba(30,41,59,.06);list-style:none;margin:0;padding-left:0}
  .reports li{border-bottom:1px solid var(--rule)}
  .reports li:last-child{border-bottom:none}
  .reports a{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;text-decoration:none;color:var(--ink);font-weight:500;font-size:15px}
  .reports a:hover{background:var(--blue-soft)}
  .reports .week{color:var(--ink-soft);font-size:13px;font-weight:400}
  .footer{margin-top:30px;font-size:11px;color:var(--ink-muted);text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">RFS Builders</div>
  <h1>Weekly Reports</h1>
  <div class="sub">Friday EOD recap — sent to Rafael every Friday</div>
  <ul class="reports">
    <li><a href="2026-05-15.html"><span>May 11 – 15, 2026</span><span class="week">Latest →</span></a></li>
    <li><a href="2026-05-08.html"><span>May 4 – 8, 2026</span><span class="week">→</span></a></li>
  </ul>
  <div class="footer">RFS Dashboard · github.com/rfsbuild/rfs-reports</div>
</div>
</body>
</html>
